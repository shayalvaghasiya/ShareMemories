<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ShareMemories Event Preview</title>
  <desc id="desc">A social sharing preview image for wedding event galleries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="50%" stop-color="#fee2e2" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#fff1f2" stop-opacity="0.92" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="130" cy="120" r="120" fill="#fde68a" fill-opacity="0.35" />
  <circle cx="1060" cy="530" r="150" fill="#93c5fd" fill-opacity="0.25" />
  <rect x="120" y="105" width="960" height="420" rx="34" fill="url(#card)" stroke="#fda4af" stroke-opacity="0.45" />
  <text x="180" y="225" fill="#9f1239" font-family="Georgia, serif" font-size="48" font-weight="700">ShareMemories</text>
  <text x="180" y="292" fill="#334155" font-family="Georgia, serif" font-size="32">View your photos from &lt;eventname&gt; wedding</text>
  <text x="180" y="360" fill="#475569" font-family="Arial, sans-serif" font-size="28">Beautiful moments, all in one place</text>
</svg>
